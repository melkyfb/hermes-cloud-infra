name: 'Deploy FreeLLMAPI Image'
on:
  push:
    branches: [ "main" ]
    paths: [ "services/freellmapi/**" ]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com
  REPO: freellmapi
  SERVICE: FreellmapiService
jobs:
  mirror-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - name: Build (mirror) & push
        run: |
          IMAGE=$ECR_REGISTRY/$REPO
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./services/freellmapi
          docker push $IMAGE --all-tags
      - name: Force ECS redeploy (skip if service not up yet — first deploy)
        run: |
          status=$(aws ecs describe-services --cluster hermes-cluster --services "$SERVICE" \
            --region "$AWS_REGION" --query 'services[0].status' --output text 2>/dev/null || echo MISSING)
          if [ "$status" = "ACTIVE" ]; then
            aws ecs update-service --cluster hermes-cluster --service "$SERVICE" \
              --force-new-deployment --region "$AWS_REGION"
          else
            echo "ECS service $SERVICE not ACTIVE (status=$status). Image is in ECR; run 'cdk deploy --all' to create the service. Skipping force-redeploy."
          fi
